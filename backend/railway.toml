[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node -e \"console.log('FILE_SIZE:', require('fs').statSync('dist/main.js').size); console.log('CONTENT:', require('fs').readFileSync('dist/main.js','utf8').substring(0,1000))\" ; sleep 60"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
