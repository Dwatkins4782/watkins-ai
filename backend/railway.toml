[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node -e \"process.stdout.write('RUNNING\\n'); try { require('./dist/main'); } catch(e) { process.stderr.write('CRASH: ' + e.stack + '\\n'); process.exit(1); }\" 2>&1 ; echo EXIT=$? ; sleep 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
