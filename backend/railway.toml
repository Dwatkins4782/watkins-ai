[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "echo '=== STEP1: check dist ===' && ls -la dist/main.js && echo '=== STEP2: prisma migrate ===' && npx prisma migrate deploy 2>&1 && echo '=== STEP3: starting node ===' && node dist/main 2>&1; echo '=== NODE EXIT CODE: '$?' ==='"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
