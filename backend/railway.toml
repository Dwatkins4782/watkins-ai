[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node -e \"const f=require('fs').readFileSync('dist/main.js','utf8'); console.log('LAST_500:', f.substring(f.length-500)); console.log('TOTAL_LENGTH:', f.length)\" ; sleep 60"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
